services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: xeno-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: xeno
      POSTGRES_PASSWORD: xeno_secret
      POSTGRES_DB: xeno_crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - xeno-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xeno -d xeno_crm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: xeno-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - xeno-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  channel-service:
    build:
      context: .
      dockerfile: apps/channel-service/Dockerfile
    container_name: xeno-channel-service
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NODE_ENV: production
      WEBHOOK_SECRET: "xeno-crm-local-dev-webhook-secret-2026"
    networks:
      - xeno-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:4000/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  crm-app:
    build:
      context: .
      dockerfile: apps/crm/Dockerfile
    container_name: xeno-crm-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    command: sh -c "pnpm --filter crm exec prisma migrate deploy && pnpm --filter crm start"
    environment:
      DATABASE_URL: "postgresql://xeno:xeno_secret@postgres:5432/xeno_crm?pgbouncer=true&connection_limit=1"
      DIRECT_URL: "postgresql://xeno:xeno_secret@postgres:5432/xeno_crm"
      REDIS_URL: "redis://redis:6379"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      CHANNEL_SERVICE_URL: "http://channel-service:4000"
      WEBHOOK_BASE_URL: "http://crm-app:3000"
      WEBHOOK_SECRET: "xeno-crm-local-dev-webhook-secret-2026"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - xeno-network

  crm-worker:
    build:
      context: .
      dockerfile: apps/crm/Dockerfile
    container_name: xeno-crm-worker
    restart: unless-stopped
    working_dir: /app/apps/crm
    command: ["npx", "tsx", "lib/queue/worker.ts"]
    environment:
      DATABASE_URL: "postgresql://xeno:xeno_secret@postgres:5432/xeno_crm?pgbouncer=true&connection_limit=1"
      DIRECT_URL: "postgresql://xeno:xeno_secret@postgres:5432/xeno_crm"
      REDIS_URL: "redis://redis:6379"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      CHANNEL_SERVICE_URL: "http://channel-service:4000"
      WEBHOOK_BASE_URL: "http://crm-app:3000"
      WEBHOOK_SECRET: "xeno-crm-local-dev-webhook-secret-2026"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      channel-service:
        condition: service_healthy
    networks:
      - xeno-network

volumes:
  postgres_data:
  redis_data:

networks:
  xeno-network:
    driver: bridge
